<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/exercises/style_2.css">
    <title>The Craftfolk - Art Shop</title>
</head>
<body>
    <header>
        <strong><h1>The Craftfolk</h1></strong><br>
        <p>Welcome to The Craftfolk! <br> Feel free to browse but this isn't just a place to window-shop. You better buy my sh*t!</p>
    </header><br>
    <main>
        <div class="product-grid">
            <section>
                <img src="https://i.pinimg.com/736x/68/d9/f8/68d9f88a3b1ced70819c1a23afb55f81.jpg" alt="">
                <h3>Poison Ivy</h3>
                <p class="price">R144.00</p>
                <button>Add to Cart</button>
            </section>
            <section>
                <img src="https://i.pinimg.com/736x/3f/ea/90/3fea90b05b9689d7e4ef71e638257c2b.jpg" alt="">
                <h3>Statue Painting</h3>
                <p class="price">R120.00</p>
                <button>Add to Cart</button>
            </section>
            <section>
                <img src="https://i.pinimg.com/736x/94/0d/fa/940dfa5be7e4aa502130fb5cfd3694d1.jpg" alt="">
                <h3>Lilavine</h3>
                <p class="price">R89.00</p>
                <button>Add to Cart</button>
            </section>
            <section>
                <img src="https://i.pinimg.com/736x/c5/6d/e0/c56de0c29e6b65f1a5b8f7f6c86134dc.jpg" alt="">
                <h3>Spider-Man</h3>
                <p class="price">R78.50</p>
                <button>Add to Cart</button>
            </section>
            <section>
                <img src="https://i.pinimg.com/736x/44/ed/ac/44edac7903db50cb7286778e25f3a504.jpg" alt="">
                <h3>Batman</h3>
                <p class="price">R165.90</p>
                <button>Add to Cart</button>
            </section>
            <section>
                <img src="https://i.pinimg.com/736x/e1/55/46/e15546690efdb1301595144a2f59e7c9.jpg" alt="">
                <h3>Dinosaur</h3>
                <p class="price">R155.00</p>
                <button>Add to Cart</button>
            </section>
        </div>
    </main>
    
</body>
</html>
